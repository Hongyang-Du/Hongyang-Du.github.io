short_bio: >-

  <p>
    Hi, I am <strong><code>Hongyang Du</code></strong>  — a Sc.M. student in Computer Science at 
    <strong><code>Brown University</code></strong> advised by 
    <a href="https://randallbalestriero.github.io/">Randall Balestriero</a>. Currently I am
    collaborating with <a href="https://yuewang.xyz/">Yue Wang</a> at the 
    <a href="https://psi-lab.ai/">USC Physical SuperIntelligence Lab</a>. 
    I previously obtained my B.S. in Computer Science and Mathematics from the 
    <strong><code>University of Maryland, College Park</code></strong>. 
    My research explores <strong><code>how Self-Supervised Learning can build World Models for robotic control</code></strong>. I focus on extracting spatiotemporal and 3D-aware priors to capture physical dynamics. I aim to create a scalable loop that couples causal prediction and action prediction.
  </p>
  <p>
      Outside of research, I am an amateur powerlifter 💪 and a pro drummer 🥁; I am a Jazz cat and prog metalhead — think <em>Chick Corea</em> meets <em>Animals as Leaders</em>. Also, I live with a cat named <strong><code>Dingzhen(丁真)🐱</code></strong>, who keeps me grounded.
  </p>
  


